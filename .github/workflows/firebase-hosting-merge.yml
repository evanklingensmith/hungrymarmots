# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stamp build version
        run: |
          BUILD_VERSION="$(date -u +%Y%m%d%H%M%S)-${GITHUB_SHA::7}"
          sed -i "s/__BUILD_VERSION__/${BUILD_VERSION}/g" public/index.html
      - name: Inject Firebase config (main site)
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG_JSON }}
        run: |
          node -e "
            const fs = require('fs');
            const f = 'public/index.html';
            fs.writeFileSync(f, fs.readFileSync(f,'utf8').replace('__FIREBASE_CONFIG__', process.env.FIREBASE_CONFIG));
          "
      - name: Build bike frontend
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG_JSON }}
        run: |
          cd bike
          rm -rf public-dist && mkdir -p public-dist
          cp frontend/index.html frontend/app.js frontend/style.css public-dist/
          cp frontend/firestore.js frontend/auth.js public-dist/
          sed -i 's/BIKEPLANNER_MODE_PLACEHOLDER/hosted/' public-dist/index.html
          node -e "
            const fs = require('fs');
            const f = 'public-dist/index.html';
            fs.writeFileSync(f, fs.readFileSync(f,'utf8').replace('__FIREBASE_CONFIG__', process.env.FIREBASE_CONFIG));
          "
      - run: npm ci && npm run build --if-present
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HUNGRYMARMOTS }}
      - name: Deploy Firestore rules
        run: npx firebase-tools deploy --only firestore:rules --project hungrymarmots
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HUNGRYMARMOTS }}
          channelId: live
          projectId: hungrymarmots
